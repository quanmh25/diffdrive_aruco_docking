controller_manager:
  ros__parameters:
    update_rate: 50 # Tần số cập nhật 50Hz
    use_sim_time: true # BẮT BUỘC cho mô phỏng Gazebo

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

diff_drive_controller:
  ros__parameters:
    use_sim_time: true # BẮT BUỘC cho mô phỏng Gazebo
    left_wheel_names: ["wheel_left_joint"]
    right_wheel_names: ["wheel_right_joint"]

    wheel_separation: 0.65
    wheel_radius: 0.1

    use_stamped_vel: true
    cmd_vel_timeout: 2.0
    publish_limited_velocity: true
    base_frame_id: base_link
    odom_frame_id: odom
    enable_odom_tf: true

    # Giới hạn vận tốc và gia tốc (Đặc biệt quan trọng cho thuật toán Docking)
    # Giúp xe đi lùi mượt mà, không bị giật cục khi thuật toán tính ra sai số lớn
    linear.x.has_velocity_limits: true
    linear.x.has_acceleration_limits: true
    linear.x.max_velocity: 0.5
    linear.x.min_velocity: -0.5
    linear.x.max_acceleration: 1.0

    angular.z.has_velocity_limits: true
    angular.z.has_acceleration_limits: true
    angular.z.max_velocity: 1.0
    angular.z.min_velocity: -1.0
    angular.z.max_acceleration: 2.0
